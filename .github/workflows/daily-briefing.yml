name: Daily Briefing

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
      MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
      EPITECH_ICS: ${{ secrets.EPITECH_ICS }}
      TZ: Europe/Paris

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir requests icalendar python-dateutil

      - name: Run daily briefing
        shell: python
        run: |
          import os, sys, re, json
          from datetime import datetime, timedelta, timezone
          from zoneinfo import ZoneInfo
          import requests
          from icalendar import Calendar

          SCRIPT_VERSION = "v4-all-tasks-grouped"
          EPITECH_GCAL_RE = re.compile(r"^\s*G-[A-Z]{3}-\d{3}\b")
          print(f"=== daily-briefing {SCRIPT_VERSION} ===", flush=True)

          def _clean(name):
              v = os.environ.get(name, "") or ""
              return v.strip().strip('"').strip("'")

          for k in ("GOOGLE_CLIENT_ID","GOOGLE_CLIENT_SECRET","GOOGLE_REFRESH_TOKEN",
                   "MS_CLIENT_ID","MS_REFRESH_TOKEN","DISCORD_TOKEN","DISCORD_CHANNEL_ID"):
              v = _clean(k)
              print(f"env {k}: len={len(v)} set={bool(v)}", flush=True)

          PARIS = ZoneInfo("Europe/Paris")
          now_local = datetime.now(PARIS)
          today_local = now_local.date()
          tomorrow_local = today_local + timedelta(days=1)

          def day_bounds_utc(d):
              start = datetime.combine(d, datetime.min.time(), tzinfo=PARIS)
              end = start + timedelta(days=1)
              return start.astimezone(timezone.utc), end.astimezone(timezone.utc)

          def fmt_time(dt):
              if hasattr(dt, "astimezone"):
                  return dt.astimezone(PARIS).strftime("%H:%M")
              return ""

          # ---------- Google Calendar ----------
          def google_token():
              r = requests.post(
                  "https://oauth2.googleapis.com/token",
                  data={
                      "client_id": _clean("GOOGLE_CLIENT_ID"),
                      "client_secret": _clean("GOOGLE_CLIENT_SECRET"),
                      "refresh_token": _clean("GOOGLE_REFRESH_TOKEN"),
                      "grant_type": "refresh_token",
                  },
                  timeout=20,
              )
              if r.status_code >= 400:
                  raise RuntimeError(f"token {r.status_code}: {r.text}")
              return r.json()["access_token"]

          def google_events_for(d, access):
              start_utc, end_utc = day_bounds_utc(d)
              params = {
                  "timeMin": start_utc.isoformat().replace("+00:00", "Z"),
                  "timeMax": end_utc.isoformat().replace("+00:00", "Z"),
                  "singleEvents": "true",
                  "orderBy": "startTime",
                  "maxResults": "50",
              }
              er = requests.get(
                  "https://www.googleapis.com/calendar/v3/calendars/primary/events",
                  headers={"Authorization": f"Bearer {access}"},
                  params=params,
                  timeout=20,
              )
              er.raise_for_status()
              items = er.json().get("items", [])
              out = []
              for e in items:
                  summary = e.get("summary", "(no title)")
                  if EPITECH_GCAL_RE.match(summary):
                      continue
                  start = e.get("start", {})
                  if "dateTime" in start:
                      dt = datetime.fromisoformat(start["dateTime"].replace("Z", "+00:00"))
                      out.append(f"- {fmt_time(dt)} — {summary}")
                  else:
                      out.append(f"- (all-day) {summary}")
              return out or ["- (no events)"]

          def google_events_both():
              try:
                  access = google_token()
                  return (
                      google_events_for(today_local, access),
                      google_events_for(tomorrow_local, access),
                  )
              except Exception as exc:
                  err = [f"- ⚠️ Google Calendar error: {exc}"]
                  return err, err

          # ---------- Microsoft To Do (ALL incomplete tasks, grouped by list) ----------
          def ms_tasks():
              try:
                  r = requests.post(
                      "https://login.microsoftonline.com/consumers/oauth2/v2.0/token",
                      data={
                          "client_id": _clean("MS_CLIENT_ID"),
                          "refresh_token": _clean("MS_REFRESH_TOKEN"),
                          "grant_type": "refresh_token",
                          "scope": "Tasks.ReadWrite offline_access",
                      },
                      timeout=20,
                  )
                  if r.status_code >= 400:
                      raise RuntimeError(f"token {r.status_code}: {r.text}")
                  access = r.json()["access_token"]
                  hdrs = {"Authorization": f"Bearer {access}"}
                  lists = requests.get(
                      "https://graph.microsoft.com/v1.0/me/todo/lists",
                      headers=hdrs, timeout=20,
                  ).json().get("value", [])
                  out = []
                  for lst in lists:
                      lid = lst["id"]
                      lname = lst.get("displayName", "") or "(unnamed)"
                      url = (
                          f"https://graph.microsoft.com/v1.0/me/todo/lists/{lid}/tasks"
                          "?$filter=status ne 'completed'&$top=100"
                      )
                      tasks = requests.get(url, headers=hdrs, timeout=20).json().get("value", [])
                      if not tasks:
                          continue
                      if out:
                          out.append("")
                      out.append(f"**{lname}**")
                      for t in tasks:
                          title = t.get("title", "(untitled)")
                          star = "⭐ " if t.get("importance") == "high" else ""
                          out.append(f"- {star}{title}")
                  return out or ["- (no tasks)"]
              except Exception as exc:
                  return [f"- ⚠️ Microsoft To Do error: {exc}"]

          # ---------- Epitech ICS ----------
          def epitech_events_for(d, ics_bytes):
              cal = Calendar.from_ical(ics_bytes)
              out = []
              for comp in cal.walk("VEVENT"):
                  dtstart = comp.get("dtstart")
                  dtend = comp.get("dtend")
                  if not dtstart:
                      continue
                  s = dtstart.dt
                  e = dtend.dt if dtend else None
                  if isinstance(s, datetime):
                      s_local = s.astimezone(PARIS) if s.tzinfo else s.replace(tzinfo=PARIS)
                  else:
                      s_local = datetime.combine(s, datetime.min.time(), tzinfo=PARIS)
                  if s_local.date() != d:
                      continue
                  summary = str(comp.get("summary", "(no title)"))
                  location = str(comp.get("location", "")).strip()
                  end_str = ""
                  if isinstance(e, datetime):
                      e_local = e.astimezone(PARIS) if e.tzinfo else e.replace(tzinfo=PARIS)
                      end_str = f"–{e_local.strftime('%H:%M')}"
                  loc = f" @ {location}" if location else ""
                  out.append(f"- {s_local.strftime('%H:%M')}{end_str} — {summary}{loc}")
              out.sort()
              return out or ["- (no classes)"]

          def epitech_events_both():
              raw = os.environ.get("EPITECH_ICS", "").strip()
              if not raw:
                  err = ["- (EPITECH_ICS not set)"]
                  return err, err
              try:
                  if raw.startswith("http://") or raw.startswith("https://"):
                      ics_bytes = requests.get(raw, timeout=20).content
                  else:
                      ics_bytes = raw.encode("utf-8", errors="replace")
                  return (
                      epitech_events_for(today_local, ics_bytes),
                      epitech_events_for(tomorrow_local, ics_bytes),
                  )
              except Exception as exc:
                  err = [f"- ⚠️ Epitech ICS error: {exc}"]
                  return err, err

          gcal_today, gcal_tomorrow = google_events_both()
          epi_today, epi_tomorrow = epitech_events_both()
          todos = ms_tasks()

          today_label = today_local.strftime('%A %d %B %Y')
          tomorrow_label = tomorrow_local.strftime('%A %d %B %Y')

          header = f"**📅 Daily Briefing — {today_label}**"
          sections = [
              header,
              "",
              f"**🎓 Epitech — Aujourd'hui**",
              *epi_today,
              "",
              f"**🎓 Epitech — Demain ({tomorrow_label})**",
              *epi_tomorrow,
              "",
              f"**🗓️ Google Calendar — Aujourd'hui**",
              *gcal_today,
              "",
              f"**🗓️ Google Calendar — Demain**",
              *gcal_tomorrow,
              "",
              f"**✅ Microsoft To Do**",
              *todos,
          ]
          content = "\n".join(sections)

          # ---------- Send to Discord (split into <=1900 char chunks) ----------
          channel = _clean("DISCORD_CHANNEL_ID")
          token = _clean("DISCORD_TOKEN")

          def split_chunks(text, limit=1900):
              lines = text.split("\n")
              chunks, buf, size = [], [], 0
              for line in lines:
                  add = len(line) + 1
                  if size + add > limit and buf:
                      chunks.append("\n".join(buf))
                      buf, size = [], 0
                  buf.append(line)
                  size += add
              if buf:
                  chunks.append("\n".join(buf))
              return chunks

          pieces = split_chunks(content)
          for i, chunk in enumerate(pieces):
              resp = requests.post(
                  f"https://discord.com/api/v10/channels/{channel}/messages",
                  headers={
                      "Authorization": f"Bot {token}",
                      "Content-Type": "application/json",
                      "User-Agent": "DailyBriefingBot (github-actions, 1.0)",
                  },
                  json={"content": chunk},
                  timeout=20,
              )
              if resp.status_code >= 300:
                  print(f"Discord error chunk {i}:", resp.status_code, resp.text, file=sys.stderr)
                  sys.exit(1)
          print(f"Briefing sent ({len(pieces)} message(s)).")
