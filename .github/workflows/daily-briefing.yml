name: Daily Briefing

on:
  # GitHub Actions cron is always UTC. Paris = UTC+2 (summer) or UTC+1 (winter),
  # so to hit 08:00 Paris year-round we fire at both 06:00 UTC and 07:00 UTC,
  # and the script self-gates on the local Paris hour.
  schedule:
    - cron: "0 6 * * *"   # 08:00 Paris (CEST, late March - late October)
    - cron: "0 7 * * *"   # 08:00 Paris (CET, late October - late March)
  workflow_dispatch:

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
      MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
      TZ: Europe/Paris

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir requests

      - name: Run daily briefing
        shell: python
        run: |
          import os, sys, json
          from datetime import datetime, timedelta, timezone
          from zoneinfo import ZoneInfo
          import requests

          SCRIPT_VERSION = "v6-dst-safe-guard"
          print(f"=== daily-briefing {SCRIPT_VERSION} ===", flush=True)

          # Only emit on scheduled runs if the Paris local hour is exactly 8.
          # Manual workflow_dispatch runs always emit (bypass the guard).
          PARIS = ZoneInfo("Europe/Paris")
          now_local = datetime.now(PARIS)
          event = os.environ.get("GITHUB_EVENT_NAME", "")
          print(f"event={event} paris_now={now_local.isoformat(timespec='minutes')}", flush=True)
          if event == "schedule" and now_local.hour != 8:
              print(f"Skipping: scheduled run at Paris hour {now_local.hour}, "
                    f"only emit when hour == 8.")
              sys.exit(0)

          def _clean(name):
              v = os.environ.get(name, "") or ""
              return v.strip().strip('"').strip("'")

          for k in ("GOOGLE_CLIENT_ID","GOOGLE_CLIENT_SECRET","GOOGLE_REFRESH_TOKEN",
                   "MS_CLIENT_ID","MS_REFRESH_TOKEN","DISCORD_TOKEN","DISCORD_CHANNEL_ID"):
              v = _clean(k)
              print(f"env {k}: len={len(v)} set={bool(v)}", flush=True)

          today_local = now_local.date()
          tomorrow_local = today_local + timedelta(days=1)

          def day_bounds_utc(d):
              start = datetime.combine(d, datetime.min.time(), tzinfo=PARIS)
              end = start + timedelta(days=1)
              return start.astimezone(timezone.utc), end.astimezone(timezone.utc)

          def fmt_time(dt):
              if hasattr(dt, "astimezone"):
                  return dt.astimezone(PARIS).strftime("%H:%M")
              return ""

          # ---------- Google Calendar (all selected calendars) ----------
          def google_token():
              r = requests.post(
                  "https://oauth2.googleapis.com/token",
                  data={
                      "client_id": _clean("GOOGLE_CLIENT_ID"),
                      "client_secret": _clean("GOOGLE_CLIENT_SECRET"),
                      "refresh_token": _clean("GOOGLE_REFRESH_TOKEN"),
                      "grant_type": "refresh_token",
                  },
                  timeout=20,
              )
              if r.status_code >= 400:
                  raise RuntimeError(f"token {r.status_code}: {r.text}")
              return r.json()["access_token"]

          def list_calendars(access):
              r = requests.get(
                  "https://www.googleapis.com/calendar/v3/users/me/calendarList",
                  headers={"Authorization": f"Bearer {access}"},
                  timeout=20,
              )
              r.raise_for_status()
              items = r.json().get("items", [])
              # Keep only calendars the user has selected (visible) in the UI
              return [c for c in items if c.get("selected")]

          def events_for_day(d, access, calendars):
              start_utc, end_utc = day_bounds_utc(d)
              params = {
                  "timeMin": start_utc.isoformat().replace("+00:00", "Z"),
                  "timeMax": end_utc.isoformat().replace("+00:00", "Z"),
                  "singleEvents": "true",
                  "orderBy": "startTime",
                  "maxResults": "50",
              }
              aggregated = []
              seen = set()
              for cal in calendars:
                  cal_id = cal["id"]
                  try:
                      er = requests.get(
                          f"https://www.googleapis.com/calendar/v3/calendars/{cal_id}/events",
                          headers={"Authorization": f"Bearer {access}"},
                          params=params,
                          timeout=20,
                      )
                      er.raise_for_status()
                      items = er.json().get("items", [])
                  except Exception as exc:
                      print(f"  warning: calendar {cal_id} failed: {exc}", flush=True)
                      continue
                  for e in items:
                      # Dedupe events that appear in multiple calendars (shared)
                      key = e.get("iCalUID") or e.get("id")
                      if key and key in seen:
                          continue
                      if key:
                          seen.add(key)
                      aggregated.append(e)

              # Sort by start time (dateTime preferred, fallback to date)
              def sort_key(e):
                  s = e.get("start", {})
                  return s.get("dateTime") or s.get("date") or ""
              aggregated.sort(key=sort_key)

              out = []
              for e in aggregated:
                  summary = e.get("summary", "(no title)")
                  start = e.get("start", {})
                  if "dateTime" in start:
                      dt = datetime.fromisoformat(start["dateTime"].replace("Z", "+00:00"))
                      out.append(f"- {fmt_time(dt)} — {summary}")
                  else:
                      out.append(f"- (toute la journée) {summary}")
              return out or ["- (rien de prévu)"]

          def google_events_both():
              try:
                  access = google_token()
                  cals = list_calendars(access)
                  print(f"  {len(cals)} selected calendar(s): {[c.get('summary') for c in cals]}", flush=True)
                  return (
                      events_for_day(today_local, access, cals),
                      events_for_day(tomorrow_local, access, cals),
                  )
              except Exception as exc:
                  err = [f"- ⚠️ Google Calendar error: {exc}"]
                  return err, err

          # ---------- Microsoft To Do (all incomplete tasks, grouped by list) ----------
          def ms_tasks():
              try:
                  r = requests.post(
                      "https://login.microsoftonline.com/consumers/oauth2/v2.0/token",
                      data={
                          "client_id": _clean("MS_CLIENT_ID"),
                          "refresh_token": _clean("MS_REFRESH_TOKEN"),
                          "grant_type": "refresh_token",
                          "scope": "Tasks.ReadWrite offline_access",
                      },
                      timeout=20,
                  )
                  if r.status_code >= 400:
                      raise RuntimeError(f"token {r.status_code}: {r.text}")
                  access = r.json()["access_token"]
                  hdrs = {"Authorization": f"Bearer {access}"}
                  lists = requests.get(
                      "https://graph.microsoft.com/v1.0/me/todo/lists",
                      headers=hdrs, timeout=20,
                  ).json().get("value", [])
                  out = []
                  for lst in lists:
                      lid = lst["id"]
                      lname = lst.get("displayName", "") or "(unnamed)"
                      url = (
                          f"https://graph.microsoft.com/v1.0/me/todo/lists/{lid}/tasks"
                          "?$filter=status ne 'completed'&$top=100"
                      )
                      tasks = requests.get(url, headers=hdrs, timeout=20).json().get("value", [])
                      if not tasks:
                          continue
                      if out:
                          out.append("")
                      out.append(f"**{lname}**")
                      for t in tasks:
                          title = t.get("title", "(untitled)")
                          star = "⭐ " if t.get("importance") == "high" else ""
                          out.append(f"- {star}{title}")
                  return out or ["- (no tasks)"]
              except Exception as exc:
                  return [f"- ⚠️ Microsoft To Do error: {exc}"]

          gcal_today, gcal_tomorrow = google_events_both()
          todos = ms_tasks()

          today_label = today_local.strftime('%A %d %B %Y')
          tomorrow_label = tomorrow_local.strftime('%A %d %B %Y')

          header = f"**📅 Daily Briefing — {today_label}**"
          sections = [
              header,
              "",
              f"**🗓️ Aujourd'hui**",
              *gcal_today,
              "",
              f"**🗓️ Demain ({tomorrow_label})**",
              *gcal_tomorrow,
              "",
              f"**✅ Microsoft To Do**",
              *todos,
          ]
          content = "\n".join(sections)

          # ---------- Send to Discord (split into <=1900 char chunks) ----------
          channel = _clean("DISCORD_CHANNEL_ID")
          token = _clean("DISCORD_TOKEN")

          def split_chunks(text, limit=1900):
              lines = text.split("\n")
              chunks, buf, size = [], [], 0
              for line in lines:
                  add = len(line) + 1
                  if size + add > limit and buf:
                      chunks.append("\n".join(buf))
                      buf, size = [], 0
                  buf.append(line)
                  size += add
              if buf:
                  chunks.append("\n".join(buf))
              return chunks

          pieces = split_chunks(content)
          for i, chunk in enumerate(pieces):
              resp = requests.post(
                  f"https://discord.com/api/v10/channels/{channel}/messages",
                  headers={
                      "Authorization": f"Bot {token}",
                      "Content-Type": "application/json",
                      "User-Agent": "DailyBriefingBot (github-actions, 1.0)",
                  },
                  json={"content": chunk},
                  timeout=20,
              )
              if resp.status_code >= 300:
                  print(f"Discord error chunk {i}:", resp.status_code, resp.text, file=sys.stderr)
                  sys.exit(1)
          print(f"Briefing sent ({len(pieces)} message(s)).")
